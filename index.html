<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factorial</title>
</head>
<body>
<input id=i type=number oninput="o.innerText=i.value>0?(f=i=>i>1?i*f(i-1):1)(i.value):''">
<p id=o></p>
</body>
</html>
