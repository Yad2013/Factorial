<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factorial</title>
</head>
<body>
<input id=n type=number oninput="out.innerText=n.value>0?(f=n=>n>1?n*f(n-1):1)(n.value):''">
<p id=out></p>
</body>
</html>
